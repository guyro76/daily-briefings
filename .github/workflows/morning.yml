name: Morning Briefing

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  personal:
    name: Personal Briefing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytz
      - name: Run personal briefing
        env:
          GCAL_ICAL_URL: ${{ secrets.GCAL_ICAL_URL }}
        run: python scripts/personal_briefing.py
      - name: Save cache
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cache/ || true
          git diff --staged --quiet || git commit -m "cache: morning personal"
          git push || true

  marketing:
    name: Marketing Briefing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytz
      - name: Run marketing briefing
        run: python scripts/marketing_briefing.py
      - name: Save cache
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cache/ || true
          git diff --staged --quiet || git commit -m "cache: morning marketing"
          git push || true

  tv-cinema:
    name: TV Cinema Briefing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytz
      - name: Run TV/Cinema briefing
        run: python scripts/tv_cinema_briefing.py
      - name: Save cache
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add cache/ || true
          git diff --staged --quiet || git commit -m "cache: morning tv-cinema"
          git push || true
